<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Redirecting...</title>
<script>
(function(){
  const hostname = window.location.hostname;
  const path = window.location.pathname;
  const lang = path.split('/')[1] || 'EN';
  const subid = hostname + '_' + lang.toUpperCase();
  window.location.replace("https://soulkyn.com/?_go=soulkynai&subid=" + subid);
})();
</script>
</head>
<body>
<p>Redirecting to partner site...</p>
<noscript><a href="https://soulkyn.com/?_go=soulkynai" rel="nofollow sponsored">Click here</a></noscript>
</body>
</html>
