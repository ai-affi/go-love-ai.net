<!-- ========== JAVASCRIPT ========== -->
<script>
(async function(){
  const lang=document.documentElement.lang||'en';
  const jsonPath=lang==='en'?'./content.json':`../${lang}/content.json`;
  let data;
  try{const r=await fetch(jsonPath);data=await r.json()}catch(e){console.error('JSON load failed',e);return}

  /* Meta */
  if(data.meta){
    document.title=data.meta.title||'';
    const dm=document.querySelector('meta[name="description"]');if(dm)dm.content=data.meta.description||'';
    const tm=document.querySelector('meta[name="title"]');if(tm)tm.content=data.meta.title||'';
  }

  /* Simple data-i18n injection */
  function resolve(obj,path){return path.split('.').reduce((o,k)=>o?.[k],obj)}
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const v=resolve(data,el.getAttribute('data-i18n'));
    if(v&&typeof v==='string')el.textContent=v;
  });

  /* Hero trust badges */
  const heroTrust=document.getElementById('hero-trust');
  if(data.hero?.trust_badges&&heroTrust){
    data.hero.trust_badges.forEach(b=>{
      const s=document.createElement('span');s.className='glass px-3 py-1.5 rounded-full';s.textContent=b;heroTrust.appendChild(s);
    });
  }

  /* Social proof */
  const spg=document.getElementById('social-proof-grid');
  if(data.social_proof?.stats&&spg){
    data.social_proof.stats.forEach(s=>{
      spg.innerHTML+=`<div class="text-center"><div class="text-3xl mb-1">${s.emoji}</div><div class="text-2xl font-black text-white">${s.number}</div><div class="text-sm text-gray-400">${s.label}</div></div>`;
    });
  }

  /* Models grid */
  const mg=document.getElementById('models-grid');
  const modelImages=[
    '../assets/images/elena-letova.jpg',
    '../assets/images/sakura-mint.jpeg',
    '../assets/images/maya-stone.jpg',
    '../assets/images/lilith-vex.jpeg',
    '../assets/images/chloe-summers.jpg',
    '../assets/images/aria-nova.jpeg'
  ];
  if(data.models?.characters&&mg){
    data.models.characters.forEach((c,i)=>{
      const img=modelImages[i]||'';
      const alt=c.image_alt||c.name+' AI character';
      mg.innerHTML+=`<a href="/go/mylovely" rel="nofollow sponsored" class="glass rounded-2xl overflow-hidden block transition hover:scale-[1.02] group">
        <div class="overflow-hidden relative"><img src="${img}" alt="${alt}" class="w-full h-auto object-contain group-hover:scale-105 transition duration-500" loading="lazy"></div>
        <div class="p-5"><h3 class="font-bold text-lg mb-1">${c.name}</h3><p class="text-sm text-gray-400 mb-2">${c.age} · ${c.type}</p><p class="text-xs text-gray-500 mb-3">${c.traits}</p><p class="text-sm text-gray-300">${c.description}</p></div>
      </a>`;
    });
  }

  /* What Is paragraphs + cards */
  const wip=document.getElementById('what-is-paragraphs');
  if(data.what_is?.paragraphs&&wip){
    data.what_is.paragraphs.forEach(p=>{wip.innerHTML+=`<p>${p}</p>`});
  }
  const wic=document.getElementById('what-is-cards');
  if(data.what_is?.cards&&wic){
    data.what_is.cards.forEach(c=>{
      wic.innerHTML+=`<div class="glass rounded-2xl p-6 text-center"><div class="text-3xl mb-3">${c.icon||'✨'}</div><h3 class="text-lg font-bold mb-2">${c.title}</h3><p class="text-sm text-gray-400">${c.desc}</p></div>`;
    });
  }

  /* Features grid */
  const fg=document.getElementById('features-grid');
  if(data.features?.items&&fg){
    const icons={'chat':'💬','image':'🖼️','video':'🎬','creator':'🎨','roleplay':'🎭','privacy':'🔒'};
    data.features.items.forEach(f=>{
      fg.innerHTML+=`<div class="glass rounded-2xl p-6"><div class="text-3xl mb-3">${icons[f.icon]||'⚡'}</div><h3 class="text-lg font-bold mb-2">${f.title}</h3><p class="text-sm text-gray-400 leading-relaxed">${f.description}</p></div>`;
    });
  }

  /* How it works */
  const hg=document.getElementById('how-it-works-grid');
  if(data.how_it_works?.steps&&hg){
    data.how_it_works.steps.forEach(s=>{
      hg.innerHTML+=`<div class="glass rounded-2xl p-8 text-center"><div class="text-5xl font-black bg-gradient-to-r from-accent to-violet bg-clip-text text-transparent mb-4">${s.number}</div><h3 class="text-xl font-bold mb-3">${s.title}</h3><p class="text-sm text-gray-400 leading-relaxed">${s.desc}</p></div>`;
    });
  }

  /* Pricing */
  const pg=document.getElementById('pricing-grid');
  if(data.pricing?.plans&&pg){
    data.pricing.plans.forEach((p,i)=>{
      const pop=i===1;
      pg.innerHTML+=`<div class="glass rounded-2xl p-8 ${pop?'ring-2 ring-accent relative':''}">
        ${pop?'<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-accent text-xs font-bold px-3 py-1 rounded-full text-black">MOST POPULAR</div>':''}
        <h3 class="text-xl font-bold mb-1">${p.name}</h3>
        <div class="text-3xl font-black mb-4">${p.price}</div>
        <ul class="space-y-2 mb-6">${p.features.map(f=>`<li class="text-sm text-gray-300 flex items-start gap-2"><span class="text-accent">✓</span>${f}</li>`).join('')}</ul>
        <a href="/go/mylovely" class="${pop?'cta-btn':'cta-ghost'} block text-center text-white font-bold px-6 py-3 rounded-full">${p.cta||'Get Started'}</a>
      </div>`;
    });
  }

  /* Total control */
  const tcp=document.getElementById('total-control-paragraphs');
  if(data.total_control?.paragraphs&&tcp){
    data.total_control.paragraphs.forEach(p=>{tcp.innerHTML+=`<p>${p}</p>`});
  }
  const tch=document.getElementById('total-control-highlights');
  if(data.total_control?.highlights&&tch){
    data.total_control.highlights.forEach(h=>{
      tch.innerHTML+=`<span class="glass px-4 py-2 rounded-full text-sm font-semibold text-accent">${h}</span>`;
    });
  }

  /* Alternatives grid + table */
  const ag=document.getElementById('alternatives-grid');
  if(data.alternatives?.apps&&ag){
    data.alternatives.apps.forEach(a=>{
      ag.innerHTML+=`<a href="${a.link}" rel="nofollow sponsored" class="glass rounded-2xl p-6 block transition hover:scale-[1.02]">
        <h3 class="text-lg font-bold mb-2">${a.name}</h3><p class="text-sm text-gray-400 mb-3">${a.desc}</p>
        <span class="text-accent text-sm font-semibold">${a.visit||'Visit Site →'}</span></a>`;
    });
  }
  const ath=document.getElementById('alt-table-head');
  const atb=document.getElementById('alt-table-body');
  if(data.alternatives?.comparison&&ath&&atb){
    const comp=data.alternatives.comparison;
    ath.innerHTML=comp.headers.map(h=>`<th class="px-4 py-3 text-xs uppercase text-gray-500 font-semibold">${h}</th>`).join('');
    comp.rows.forEach(row=>{
      atb.innerHTML+=`<tr class="border-t border-white/5">${row.map((c,i)=>`<td class="px-4 py-3 text-sm ${i===0?'font-semibold text-white':'text-gray-400'}">${c}</td>`).join('')}</tr>`;
    });
  }

  /* Reviews */
  const rg=document.getElementById('reviews-grid');
  if(data.reviews?.testimonials&&rg){
    data.reviews.testimonials.forEach(t=>{
      rg.innerHTML+=`<div class="glass rounded-2xl p-6"><div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-accent to-violet flex items-center justify-center text-sm font-bold">${t.name[0]}</div>
        <div><div class="font-semibold text-sm">${t.name}, ${t.age}</div><div class="text-xs text-gray-500">${t.city}</div></div>
        <div class="ml-auto text-accent text-sm">${'★'.repeat(t.stars||5)}</div>
      </div><p class="text-sm text-gray-300 leading-relaxed italic">"${t.text}"</p></div>`;
    });
  }

  /* Safety */
  const sg=document.getElementById('safety-grid');
  if(data.safety?.points&&sg){
    data.safety.points.forEach(p=>{
      sg.innerHTML+=`<div class="glass rounded-2xl p-6"><div class="text-2xl mb-2">${p.icon||'🔒'}</div><h3 class="font-bold mb-2">${p.title}</h3><p class="text-sm text-gray-400">${p.desc}</p></div>`;
    });
  }

  /* FAQ */
  const fl=document.getElementById('faq-list');
  if(data.faq?.questions&&fl){
    data.faq.questions.forEach((q,i)=>{
      const d=document.createElement('div');d.className='glass rounded-xl overflow-hidden';
      d.innerHTML=`<button class="w-full text-left px-6 py-4 flex items-center justify-between gap-4 hover:bg-white/5 transition" aria-expanded="false">
        <span class="font-semibold text-sm">${q.q}</span>
        <svg class="w-5 h-5 text-gray-500 shrink-0 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button><div class="faq-answer"><div class="px-6 pb-4 text-sm text-gray-400 leading-relaxed">${q.a}</div></div>`;
      d.querySelector('button').addEventListener('click',function(){
        const ans=this.nextElementSibling;const svg=this.querySelector('svg');
        const open=ans.classList.toggle('open');
        svg.style.transform=open?'rotate(180deg)':'';
        this.setAttribute('aria-expanded',open);
      });
      fl.appendChild(d);
    });
  }

  /* Final CTA trust */
  const fct=document.getElementById('final-cta-trust');
  if(data.final_cta?.trust_badges&&fct){
    data.final_cta.trust_badges.forEach(b=>{
      fct.innerHTML+=`<span class="glass px-3 py-1.5 rounded-full">${b}</span>`;
    });
  }

  /* Language selectors */
  const langs=[
    {code:'en',flag:'🇬🇧',label:'EN'},
    {code:'fr',flag:'🇫🇷',label:'FR'},
    {code:'es',flag:'🇪🇸',label:'ES'},
    {code:'de',flag:'🇩🇪',label:'DE'},
    {code:'it',flag:'🇮🇹',label:'IT'},
    {code:'br',flag:'🇧🇷',label:'BR'},
    {code:'pl',flag:'🇵🇱',label:'PL'},
    {code:'nl',flag:'🇳🇱',label:'NL'},
    {code:'ru',flag:'🇷🇺',label:'RU'},
    {code:'jp',flag:'🇯🇵',label:'JP'},
    {code:'kr',flag:'🇰🇷',label:'KR'},
    {code:'zn',flag:'🇨🇳',label:'ZN'}
  ];
  function buildLangSelector(container){
    if(!container)return;
    langs.forEach(l=>{
      const a=document.createElement('a');
      a.href=l.code==='en'?'/':'/'+l.code+'/';
      a.className=`hover:opacity-100 transition ${l.code===lang?'opacity-100':'opacity-50'}`;
      a.textContent=l.flag;a.title=l.label;
      container.appendChild(a);
    });
  }
  buildLangSelector(document.getElementById('lang-selector-nav'));
  buildLangSelector(document.getElementById('lang-selector-footer'));

  /* Affiliate sub-ID injection */
  const subid=`${window.location.hostname}_${lang.toUpperCase()}`;
  document.querySelectorAll('a[href^="/go/"]').forEach(a=>{
    a.href+=(a.href.includes('?')?'&':'?')+'sid='+subid;
    a.setAttribute('rel','nofollow noopener sponsored');
    a.setAttribute('target','_blank');
  });

  /* Mobile menu toggle */
  const mmb=document.getElementById('mobile-menu-btn');
  const mm=document.getElementById('mobile-menu');
  if(mmb&&mm){mmb.addEventListener('click',()=>mm.classList.toggle('hidden'))}

  /* Navbar scroll effect */
  const nb=document.getElementById('navbar');
  window.addEventListener('scroll',()=>{
    if(window.scrollY>50){nb.style.background='rgba(10,10,15,0.92)'}
    else{nb.style.background=''}
  });

})();
</script>
</body>
</html>
